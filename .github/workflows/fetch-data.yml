name: Fetch NSE Market Data

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'   # Every 5 min, 8:30AM–4:30PM IST (Mon–Fri)
  workflow_dispatch:               # Manual trigger
  repository_dispatch:             # External trigger from cron-job.org
    types: [fetch-nse]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Fix Node.js 20 deprecation warning

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests
          pip install "nse[server]" || echo "nse package install failed, using direct HTTP only"

      - name: Fetch NSE data
        run: python fetch_data.py
        continue-on-error: true

      - name: Run signal engine
        run: python signal_engine.py
        continue-on-error: true

      - name: Show fetch result
        run: |
          cat data/fetch_status.json 2>/dev/null || echo "no status file"
          cat data/fetch_errors.json 2>/dev/null || echo "no errors"

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u '+%H:%M UTC')"
          git push
