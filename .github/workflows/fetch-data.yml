name: Fetch NSE Market Data

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'   # every 5 min, 8:30AM–4:30PM IST (UTC 3:00–10:59), Mon–Fri
  workflow_dispatch:               # manual trigger anytime

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests
          pip install "nse[server]" || echo "nse package install failed, will use direct HTTP only"

      - name: Fetch NSE data
        run: python fetch_data.py
        # Don't fail the whole workflow if fetch fails — still commit whatever was saved
        continue-on-error: true

      - name: Show data directory
        run: |
          echo "=== data/ contents ==="
          ls -lh data/ 2>/dev/null || echo "data/ is empty"
          echo "=== fetch_status ==="
          cat data/fetch_status.json 2>/dev/null || echo "no status file"
          echo "=== fetch_errors ==="
          cat data/fetch_errors.json 2>/dev/null || echo "no errors file"

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u '+%H:%M UTC')"
          git push
